<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>今天吃啥？</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fdfcfb 100%);
  min-height: 100vh;
  color: #333;
  -webkit-tap-highlight-color: transparent;
}
.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}
h1 {
  text-align: center;
  font-size: 28px;
  margin: 20px 0 8px;
  color: #e74c3c;
}
.subtitle {
  text-align: center;
  color: #888;
  font-size: 14px;
  margin-bottom: 24px;
}
/* 菜系筛选 */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 24px;
}
.filter-btn {
  padding: 6px 14px;
  border: 2px solid #e74c3c;
  border-radius: 20px;
  background: white;
  color: #e74c3c;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn.active {
  background: #e74c3c;
  color: white;
}
/* 主按钮 */
.main-btn {
  display: block;
  width: 160px;
  height: 160px;
  margin: 0 auto 32px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #e74c3c, #c0392b);
  color: white;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(231,76,60,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
  animation: pulse 2s infinite;
}
.main-btn:active {
  transform: scale(0.95);
  box-shadow: 0 2px 10px rgba(231,76,60,0.3);
  animation: none;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}
/* 菜品卡片 */
.dish-card {
  background: white;
  border-radius: 16px;
  padding: 24px 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  display: none;
}
.dish-card.show {
  display: block;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.dish-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.dish-name {
  font-size: 24px;
  font-weight: bold;
  color: #2c3e50;
}
.fav-btn {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  padding: 4px;
  transition: transform 0.2s;
}
.fav-btn:active { transform: scale(1.3); }
.fav-btn.active { animation: heartBeat 0.3s; }
@keyframes heartBeat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.4); }
}
.tags {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.tag {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}
.tag-cuisine { background: #fff3e0; color: #e65100; }
.tag-difficulty { background: #e8f5e9; color: #2e7d32; }
.tag-time { background: #e3f2fd; color: #1565c0; }
.section-title {
  font-size: 15px;
  font-weight: bold;
  color: #555;
  margin: 16px 0 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.ingredients-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 4px;
}
.ingredient {
  background: #f5f5f5;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 13px;
  color: #555;
}
.steps-list {
  counter-reset: step;
  list-style: none;
}
.steps-list li {
  counter-increment: step;
  padding: 8px 0 8px 36px;
  position: relative;
  font-size: 14px;
  line-height: 1.6;
  color: #444;
  border-bottom: 1px solid #f0f0f0;
}
.steps-list li:last-child { border-bottom: none; }
.steps-list li::before {
  content: counter(step);
  position: absolute;
  left: 0;
  top: 8px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #e74c3c;
  color: white;
  font-size: 12px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* 换一个按钮 */
.change-btn {
  display: block;
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  border: 2px dashed #e74c3c;
  border-radius: 12px;
  background: none;
  color: #e74c3c;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.change-btn:active {
  background: #e74c3c;
  color: white;
  border-style: solid;
}
/* 收藏列表 */
.fav-section {
  margin-top: 32px;
}
.fav-title {
  font-size: 18px;
  font-weight: bold;
  color: #2c3e50;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.fav-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.fav-item {
  background: white;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 13px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  cursor: pointer;
  color: #333;
  transition: transform 0.15s;
}
.fav-item:active { transform: scale(0.95); }
.fav-empty {
  color: #aaa;
  font-size: 14px;
  text-align: center;
  padding: 16px;
}
</style>
</head>
<body>
<div class="container">
  <h1>今天吃啥？</h1>
  <p class="subtitle">小熊妹妹的美食随机推荐</p>

  <div class="filter-bar" id="filterBar"></div>

  <button class="main-btn" id="mainBtn" onclick="randomDish()">开吃！</button>

  <div class="dish-card" id="dishCard">
    <div class="dish-header">
      <span class="dish-name" id="dishName"></span>

    </div>
    <div class="tags" id="tags"></div>
    <div class="section-title">🥘 食材</div>
    <div class="ingredients-list" id="ingredients"></div>
    <div class="section-title">👨‍🍳 做法</div>
    <ol class="steps-list" id="steps"></ol>
    <button class="change-btn" onclick="randomDish()">换一个 ➜</button>

    <div class="fav-title">❤️ 我的收藏</div>
    <div class="fav-list" id="favList"></div>
  </div>
</div>

const cuisines = ["全部", ...new Set(dishes.map(d => d.cuisine))];
let currentCuisine = "全部";
let currentDish = null;
let favorites = JSON.parse(localStorage.getItem("favDishes") || "[]");

// 初始化筛选栏
function initFilters() {
  const bar = document.getElementById("filterBar");
  bar.innerHTML = cuisines.map(c =>
    `<button class="filter-btn${c === currentCuisine ? ' active' : ''}" onclick="setCuisine('${c}')">${c}</button>`
  ).join("");
}

function setCuisine(c) {
  currentCuisine = c;
  initFilters();
  randomDish();
}

function getFilteredDishes() {
  return currentCuisine === "全部" ? dishes : dishes.filter(d => d.cuisine === currentCuisine);
}

function randomDish() {
  const pool = getFilteredDishes();
  if (pool.length === 0) return;
  let dish;
  do {
    dish = pool[Math.floor(Math.random() * pool.length)];
  } while (pool.length > 1 && dish === currentDish);
  currentDish = dish;
  renderDish();
}

function renderDish() {
  const card = document.getElementById("dishCard");
  const d = currentDish;
  document.getElementById("dishName").textContent = d.name;
  document.getElementById("tags").innerHTML =
    `<span class="tag tag-cuisine">${d.cuisine}</span>` +
    `<span class="tag tag-difficulty">${d.difficulty}</span>` +
    `<span class="tag tag-time">${d.time}</span>`;
  document.getElementById("ingredients").innerHTML =
    d.ingredients.map(i => `<span class="ingredient">${i}</span>`).join("");
  document.getElementById("steps").innerHTML =
    d.steps.map(s => `<li>${s}</li>`).join("");
  updateFavBtn();
  card.classList.remove("show");
  void card.offsetWidth;
  card.classList.add("show");
}

function updateFavBtn() {
  const btn = document.getElementById("favBtn");
  const isFav = favorites.includes(currentDish.name);
  btn.textContent = isFav ? "❤️" : "🤍";
  btn.classList.toggle("active", isFav);
}

function toggleFav() {
  const name = currentDish.name;
  const idx = favorites.indexOf(name);
  if (idx > -1) {
    favorites.splice(idx, 1);
  } else {
    favorites.push(name);
  }
  localStorage.setItem("favDishes", JSON.stringify(favorites));
  updateFavBtn();
  renderFavList();
}

function renderFavList() {
  const list = document.getElementById("favList");
  if (favorites.length === 0) {
    list.innerHTML = '<div class="fav-empty">还没有收藏哦，点击 ❤️ 收藏喜欢的菜</div>';
    return;
  }
  list.innerHTML = favorites.map(name => {
    const d = dishes.find(x => x.name === name);
    return d ? `<span class="fav-item" onclick="showFavDish('${name}')">${d.name}</span>` : "";
  }).join("");
}

function showFavDish(name) {
  currentDish = dishes.find(d => d.name === name);
  if (currentDish) renderDish();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

initFilters();
renderFavList();
</script>
