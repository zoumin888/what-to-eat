<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>今天吃啥？</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#e74c3c;--primary-dark:#c0392b;
  --bg-start:#0f0c29;--bg-mid:#302b63;--bg-end:#24243e;
  --card-bg:rgba(255,255,255,0.06);--card-border:rgba(255,255,255,0.1);
  --text:#f0f0f0;--text-sub:rgba(255,255,255,0.6);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(135deg,var(--bg-start),var(--bg-mid),var(--bg-end));
  min-height:100vh;color:var(--text);
  -webkit-tap-highlight-color:transparent;
  overflow-x:hidden;
}
/* 浮动光效 */
body::before{
  content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle at 30% 40%,rgba(231,76,60,0.08) 0%,transparent 50%),
             radial-gradient(circle at 70% 60%,rgba(142,68,173,0.06) 0%,transparent 50%);
  animation:bgFloat 20s ease-in-out infinite;z-index:0;
}
@keyframes bgFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(-3%,2%)}}
.container{
  max-width:420px;margin:0 auto;padding:20px 16px 40px;
  position:relative;z-index:1;
}
/* 顶部 */
.hero{text-align:center;padding:24px 0 8px}
.hero-emoji{font-size:40px;margin-bottom:8px}
.hero h1{
  font-size:26px;font-weight:800;
  background:linear-gradient(135deg,#ff6b6b,#ffa07a,#ffd93d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:6px;
}
.hero-sub{font-size:13px;color:var(--text-sub);letter-spacing:1px}
/* 筛选栏 */
.filter-bar{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  margin:20px 0 24px;
}
.filter-btn{
  padding:6px 14px;border:1px solid var(--card-border);
  border-radius:20px;background:var(--card-bg);
  color:var(--text-sub);font-size:12px;cursor:pointer;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:all .25s;
}
.filter-btn.active{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;border-color:transparent;
  box-shadow:0 4px 15px rgba(231,76,60,0.35);
}
/* 主按钮 */
.main-btn{
  display:block;width:150px;height:150px;margin:0 auto 32px;
  border-radius:50%;border:2px solid rgba(255,255,255,0.15);
  background:linear-gradient(135deg,#e74c3c,#c0392b,#8e44ad);
  background-size:200% 200%;animation:gradient 3s ease infinite;
  color:white;font-size:22px;font-weight:700;cursor:pointer;
  box-shadow:0 8px 30px rgba(231,76,60,0.35),inset 0 1px 0 rgba(255,255,255,0.2);
  transition:transform .15s,box-shadow .15s;
  position:relative;overflow:hidden;
}
.main-btn::after{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.15) 0%,transparent 60%);
  animation:shimmer 3s ease-in-out infinite;
}
@keyframes gradient{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes shimmer{0%,100%{transform:rotate(0deg)}50%{transform:rotate(180deg)}}
.main-btn:active{
  transform:scale(0.92);
  box-shadow:0 4px 15px rgba(231,76,60,0.25);
}
/* 菜品卡片 */
.dish-card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:20px;overflow:hidden;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:none;
}
.dish-card.show{display:block;animation:slideUp .4s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.dish-image-wrap{
  position:relative;overflow:hidden;height:200px;
  display:flex;align-items:center;justify-content:center;
}
.dish-image-wrap .bg-grad{
  position:absolute;inset:0;z-index:0;
}
.dish-image-name{
  position:relative;z-index:1;
  font-size:36px;font-weight:800;color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,0.5),0 0 40px rgba(0,0,0,0.2);
  letter-spacing:6px;
  animation:namePop .5s cubic-bezier(.16,1,.3,1);
}
@keyframes namePop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.dish-body{padding:20px}
.dish-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.dish-name{font-size:22px;font-weight:700;color:#fff}
.fav-btn{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);
  font-size:20px;cursor:pointer;padding:6px 8px;border-radius:10px;
  transition:all .2s;
}
.fav-btn:active{transform:scale(1.2)}
.tags{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tag{
  padding:3px 10px;border-radius:10px;font-size:11px;font-weight:500;
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
}
.tag-cuisine{background:rgba(255,160,122,0.15);color:#ffa07a;border:1px solid rgba(255,160,122,0.2)}
.tag-difficulty{background:rgba(144,238,144,0.12);color:#90ee90;border:1px solid rgba(144,238,144,0.2)}
.tag-time{background:rgba(135,206,250,0.12);color:#87cefa;border:1px solid rgba(135,206,250,0.2)}
.section-title{
  font-size:13px;font-weight:600;color:var(--text-sub);
  margin:16px 0 10px;text-transform:uppercase;letter-spacing:1px;
}
.ingredients-list{display:flex;flex-wrap:wrap;gap:6px}
.ingredient{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
  padding:4px 10px;border-radius:8px;font-size:12px;color:var(--text-sub);
}
.steps-list{counter-reset:step;list-style:none}
.steps-list li{
  counter-increment:step;padding:10px 0 10px 40px;position:relative;
  font-size:13px;line-height:1.7;color:rgba(255,255,255,0.75);
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.steps-list li:last-child{border-bottom:none}
.steps-list li::before{
  content:counter(step);position:absolute;left:0;top:10px;
  width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:white;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.change-btn{
  display:block;width:100%;padding:14px;margin-top:20px;
  border:1px dashed rgba(255,255,255,0.15);border-radius:14px;
  background:rgba(255,255,255,0.03);color:var(--text-sub);
  font-size:15px;cursor:pointer;transition:all .25s;
}
.change-btn:active{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;border-style:solid;border-color:transparent;
}
/* 收藏 */
.fav-section{margin-top:32px}
.fav-title{font-size:16px;font-weight:600;margin-bottom:12px;color:var(--text-sub)}
.fav-list{display:flex;flex-wrap:wrap;gap:8px}
.fav-item{
  background:var(--card-bg);border:1px solid var(--card-border);
  padding:8px 14px;border-radius:14px;font-size:12px;
  cursor:pointer;color:var(--text-sub);transition:all .2s;
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
}
.fav-item:active{transform:scale(0.95);background:rgba(255,255,255,0.1)}
.fav-empty{color:rgba(255,255,255,0.3);font-size:13px;text-align:center;padding:16px}
.counter{text-align:center;color:rgba(255,255,255,0.25);font-size:11px;margin-top:12px;letter-spacing:1px}
/* 底部签名 */
.footer{
  text-align:center;margin-top:32px;padding:16px;
  color:rgba(255,255,255,0.2);font-size:11px;letter-spacing:1px;
}
.footer span{
  background:linear-gradient(135deg,#ff6b6b,#ffa07a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;font-weight:600;
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-emoji">🍳</div>
    <h1>今天吃啥？</h1>
    <p class="hero-sub">邹敏哥哥帮你决定</p>
  </div>

  <div class="filter-bar" id="filterBar"></div>

  <button class="main-btn" onclick="randomDish()">开吃！</button>

  <div class="dish-card" id="dishCard">
    <div class="dish-image-wrap" id="dishImageWrap">
      <div class="bg-grad" id="dishBgGrad"></div>
      <div class="dish-image-name" id="dishImageName"></div>
    </div>
    <div class="dish-body">
      <div class="dish-header">
        <span class="dish-name" id="dishName"></span>
        <button class="fav-btn" id="favBtn" onclick="toggleFav()">🤍</button>
      </div>
      <div class="tags" id="tags"></div>
      <div class="section-title">🥘 食材</div>
      <div class="ingredients-list" id="ingredients"></div>
      <div class="section-title">👨‍🍳 做法</div>
      <ol class="steps-list" id="steps"></ol>
      <button class="change-btn" onclick="randomDish()">换一个 ➜</button>
    </div>
  </div>

  <div class="fav-section" id="favSection">
    <div class="fav-title">❤️ 我的收藏</div>
    <div class="fav-list" id="favList"></div>
  </div>

  <p class="counter" id="counter"></p>

  <div class="footer">Made with ❤️ by <span>邹敏哥哥</span></div>
</div>

<script>

{name:"酸笋炒牛肉",cuisine:"广西",difficulty:"简单",time:"15分钟",ingredients:["牛肉250g","酸笋100g","辣椒","蒜","生抽","淀粉"],steps:["牛肉切薄片，加生抽、淀粉腌10分钟","酸笋切片，辣椒切段","热油爆香蒜末和辣椒","大火快炒牛肉至变色盛出","下酸笋翻炒出香，倒回牛肉炒匀","加盐调味出锅"]},

{name:"酸豆角炒肉末",cuisine:"广西",difficulty:"简单",time:"10分钟",ingredients:["酸豆角150g","猪肉末200g","辣椒","蒜","生抽","糖"],steps:["酸豆角切小段，辣椒切圈","热油炒肉末至变色","加蒜末辣椒爆香","倒入酸豆角翻炒2分钟","加少许糖提鲜，出锅"]},

const cuisines=["全部",...new Set(dishes.map(d=>d.cuisine))];
let currentCuisine="全部",currentDish=null;
let favorites=JSON.parse(localStorage.getItem("favDishes")||"[]");

function initFilters(){
  const bar=document.getElementById("filterBar");
  bar.innerHTML=cuisines.map(c=>
    `<button class="filter-btn${c===currentCuisine?' active':''}" onclick="setCuisine('${c}')">${c}</button>`
  ).join("");
  updateCounter();
}

function updateCounter(){
  document.getElementById("counter").textContent=`共 ${getFilteredDishes().length} 道菜`;
}

function setCuisine(c){currentCuisine=c;initFilters();randomDish()}

function getFilteredDishes(){
  return currentCuisine==="全部"?dishes:dishes.filter(d=>d.cuisine===currentCuisine);
}

function randomDish(){
  const pool=getFilteredDishes();
  if(!pool.length)return;
  let dish;
  do{dish=pool[Math.floor(Math.random()*pool.length)]}
  while(pool.length>1&&dish===currentDish);
  currentDish=dish;
  renderDish();
}

function renderDish(){
  const card=document.getElementById("dishCard"),d=currentDish;
  const vis=dishVisuals[d.name]||{grad:"linear-gradient(135deg,#667eea,#764ba2)"};
  document.getElementById("dishBgGrad").style.background=vis.grad;
  document.getElementById("dishImageName").textContent=d.name;
  document.getElementById("dishName").textContent=d.name;
  document.getElementById("tags").innerHTML=
    `<span class="tag tag-cuisine">${d.cuisine}</span>`+
    `<span class="tag tag-difficulty">${d.difficulty}</span>`+
    `<span class="tag tag-time">${d.time}</span>`;
  document.getElementById("ingredients").innerHTML=
    d.ingredients.map(i=>`<span class="ingredient">${i}</span>`).join("");
  document.getElementById("steps").innerHTML=
    d.steps.map(s=>`<li>${s}</li>`).join("");
  updateFavBtn();
  card.classList.remove("show");void card.offsetWidth;card.classList.add("show");
}

function updateFavBtn(){
  const btn=document.getElementById("favBtn"),isFav=favorites.includes(currentDish.name);
  btn.textContent=isFav?"❤️":"🤍";
}

function toggleFav(){
  const name=currentDish.name,idx=favorites.indexOf(name);
  if(idx>-1)favorites.splice(idx,1);else favorites.push(name);
  localStorage.setItem("favDishes",JSON.stringify(favorites));
  updateFavBtn();renderFavList();
}

function renderFavList(){
  const list=document.getElementById("favList");
  if(!favorites.length){list.innerHTML='<div class="fav-empty">还没有收藏哦，点击 ❤️ 收藏喜欢的菜</div>';return}
  list.innerHTML=favorites.map(name=>{
    const d=dishes.find(x=>x.name===name);
    return d?`<span class="fav-item" onclick="showFavDish('${name}')">${d.name}</span>`:"";
  }).join("");
}

function showFavDish(name){
  currentDish=dishes.find(d=>d.name===name);
  if(currentDish)renderDish();
  window.scrollTo({top:0,behavior:"smooth"});
}

initFilters();renderFavList();
</script>
